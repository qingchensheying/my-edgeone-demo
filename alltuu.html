    <!-- 进度条样式 -->

        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: #0066CC;
            z-index: 9999;
            transition: width 0.2s ease;
        }

        /* 固定定位布局 */
        body {
            margin: 0;
            padding: 0;
        }

        /* iframe容器样式 - 填充中间空间 */
        .iframe-container {
            height: 100%;
            overflow: hidden;
        }

        /* 确保html和body占满整个屏幕 */
        html, body {
            height: 100%;
        }

        /* iframe样式 - 撑满容器 */
        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* 错误提示样式 */
        .error-overlay {
            background: #f8fafc;
            /* 浅灰色背景，与导航栏半透明白色区分 */
            display: flex;
            align-items: center;
            /* 垂直方向居中对齐 */
            justify-content: center;
            z-index: 40;
            padding: 2rem;
        }

        /* 错误提示内容样式 */
        .error-content {
            max-width: 400px;
            background: white;
            /* 内容区域使用白色 */
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            /* 添加阴影增加层次感 */
        }
        
        /* 页脚智能分隔线 */
        .footer-item:not(:first-child) {
            position: relative;
            margin-left: 0.25rem;
            padding-left: 0.5rem;
        }
        
        .footer-item:not(:first-child)::before {
            content: '|';
            position: absolute;
            left: 0;
            color: #4B5563;
        }
    </style>

<body class="bg-white text-secondary antialiased flex flex-col min-h-screen">

    <!-- 导航栏 - 固定在顶部 -->
    <header class="fixed top-0 left-0 right-0 bg-white/80 backdrop-blur-sm z-50 border-b border-gray-200">

                <!-- 导航菜单 -->

                        class="inline-flex items-center space-x-0.5 px-1 py-2 bg-gradient-to-r from-[#FF7D00] to-[#FF7D00]/80 text-white rounded-md text-xs font-medium shadow-[0_4px_12px_rgba(255,125,0,0.3)] hover:bg-gradient-to-r from-[#FF7D00]/90 to-[#FF7D00]/60 hover:shadow-[0_6px_20px_rgba(255,125,0,0.4)] transition-all duration-200 transform hover:scale-105 active:scale-95 focus:outline-none focus:ring-2 focus:ring-[#FF7D00] focus:ring-offset-2">
                        <span>🎁</span>
                        <!-- <span>限时优惠</span> -->

                    <a href="#" id="moreLink"
                        class="inline-flex items-center space-x-0.5 px-1 py-2 bg-gradient-to-r from-primary to-primary/70 text-white rounded-md text-xs font-medium shadow-[0_4px_12px_rgba(0,102,204,0.3)] hover:bg-gradient-to-r from-primary/90 to-primary/50 hover:shadow-[0_6px_20px_rgba(0,102,204,0.4)] transition-all duration-200 transform hover:scale-105 active:scale-95 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">

    <!-- 中间内容区域 -->
    <div class="flex-grow pt-16 md:pt-20 relative">

            <div class="error-content text-center">

                    <i class="fa fa-home"></i>
                    <span>返回首页</span>

            </div>
        </div>
        <!-- iframe容器 - 填充中间空间 -->
        <div class="iframe-container h-full" id="iframeContainer">
            <iframe src="" scrolling="yes" allowfullscreen id="contentIframe"></iframe>
        </div>
    </div>

    <!-- 页脚 - 与首页保持一致 -->
<footer class="bg-dark text-white py-2 md:py-3 flex items-center justify-center">

    <!-- JavaScript -->
    <script>
        // 参数检查功能
        function checkParameters() {
            // 获取URL参数
            const urlParams = new URLSearchParams(window.location.search);
            const albumId = urlParams.get('id');

            // 检查参数是否存在且长度为32位
            if (!albumId || albumId.length !== 32) {
                // 参数不存在或长度不正确，显示错误提示
                showError();
                return null;
            }

            return albumId;
        }

        // 显示错误提示
        function showError() {
            const errorOverlay = document.getElementById('errorOverlay');
            const iframeContainer = document.getElementById('iframeContainer');

            // 显示错误提示，隐藏iframe
            errorOverlay.style.display = 'flex';
            iframeContainer.style.display = 'none';
        }

        // 设置iframe的src
        function setIframeSrc() {
            const albumId = checkParameters();
            const iframe = document.getElementById('contentIframe');

            if (albumId) {
                // 设置iframe的src为带有正确参数的链接
                iframe.src = `https://m.alltuu.com/album/${albumId}/`;
            }
        }

        // 获取iframe元素
        const iframe = document.getElementById('contentIframe');

        // 监听iframe内部滚动事件来更新进度条
        iframe.onload = function () {
            try {
                // 获取iframe内部文档
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;

                // 监听iframe内部滚动
                iframeDoc.addEventListener('scroll', function () {
                    updateProgressBar();
                });
            } catch (error) {
                console.log('跨域访问限制，使用iframe容器滚动');
                // 跨域时，使用默认的window滚动事件
            }
        };

        // 更新进度条的函数
        function updateProgressBar() {
            let scrollTop, scrollHeight, clientHeight;

            try {
                // 尝试获取iframe内部文档的滚动信息
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                scrollTop = iframeDoc.documentElement.scrollTop || iframeDoc.body.scrollTop;
                scrollHeight = iframeDoc.documentElement.scrollHeight || iframeDoc.body.scrollHeight;
                clientHeight = iframeDoc.documentElement.clientHeight || iframeDoc.body.clientHeight;
            } catch (error) {
                // 跨域时，使用默认的window滚动信息
                scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
                scrollHeight = document.documentElement.scrollHeight || document.body.scrollHeight;
                clientHeight = document.documentElement.clientHeight || document.body.clientHeight;
            }

            // 计算滚动百分比
            const scrollPercentage = (scrollHeight > clientHeight) ? (scrollTop / (scrollHeight - clientHeight)) * 100 : 0;

            // 更新进度条
            const progressBar = document.getElementById('progressBar');
            if (progressBar) {
                progressBar.style.width = scrollPercentage + '%';
            }
        }

        // 添加新函数来更新导航链接和Logo链接
        function updateLink() {
            const urlParams = new URLSearchParams(window.location.search);
            const albumId = urlParams.get('id');
            const promotionLink = document.getElementById('promotionLink');
            const moreLink = document.getElementById('moreLink');
            const homeLink = document.getElementById('homeLink');
            const privacyLink = document.getElementById('privacyLink');

            if (albumId) {
                promotionLink.href = `promotion.html?id=${albumId}`;
                moreLink.href = `index.html?id=${albumId}`;
                homeLink.href = `index.html?id=${albumId}`;
                privacyLink.href = `privacy.html?id=${albumId}`;
            } else {
                promotionLink.href = 'promotion.html';
                moreLink.href = 'index.html';
                homeLink.href = 'index.html';
                privacyLink.href = 'privacy.html';
            }
        }
        // 页面加载完成后执行参数检查和iframe设置
        window.addEventListener('DOMContentLoaded', function () {
            setIframeSrc();
            updateLink();
        });
    </script>
</body>
