<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青尘摄影工作室 - 照片直播</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- 自定义配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0066CC',
                        secondary: '#1E293B',
                        accent: '#FF6D00',
                        dark: '#111111',
                        light: '#F5F5F5',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <!-- 进度条样式 -->
    <style>
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: #0066CC;
            z-index: 9999;
            transition: width 0.2s ease;
        }
        
        /* 固定定位布局 */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        
        /* iframe容器样式 - 填充导航栏和页脚之间的空间 */
        .iframe-container {
            position: fixed;
            top: 64px;
            left: 0;
            right: 0;
            bottom: 64px;
            overflow: hidden;
        }
        
        /* 中等及以上屏幕调整容器位置 */
        @media (min-width: 768px) {
            .iframe-container {
                top: 80px;
                bottom: 80px;
            }
        }
        
        /* iframe样式 - 撑满容器 */
        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        
        /* 错误提示样式 */
        .error-overlay {
            position: fixed;
            top: 64px;
            left: 0;
            right: 0;
            bottom: 64px;
            background: #f8fafc; /* 浅灰色背景，与导航栏半透明白色区分 */
            display: flex;
            align-items: center; /* 垂直方向居中对齐 */
            justify-content: center;
            z-index: 999;
            padding: 2rem;
        }
        
        /* 错误提示内容样式 */
        .error-content {
            max-width: 400px;
            background: white; /* 内容区域使用白色 */
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); /* 添加阴影增加层次感 */
        }
        
        /* 中等及以上屏幕调整错误提示位置 */
        @media (min-width: 768px) {
            .error-overlay {
                top: 80px;
                bottom: 80px;
            }
        }
    </style>
    <script>
        var _hmt = _hmt || [];
        (function () {
            var hm = document.createElement("script");
            hm.src = "https://hm.baidu.com/hm.js?cf3a5f4a8a435f0a6a15ed90ddc7a1de";
            var s = document.getElementsByTagName("script")[0];
            s.parentNode.insertBefore(hm, s);
        })();
    </script>
</head>
<body class="bg-white text-secondary antialiased">
    <!-- 进度条 -->
    <div class="progress-bar" id="progressBar"></div>

    <!-- 导航栏 - 固定在顶部 -->
    <header class="fixed top-0 left-0 right-0 bg-white/80 backdrop-blur-sm z-50 border-b border-gray-200">
        <div class="container mx-auto px-4 md:px-6 lg:px-8">
            <nav class="flex items-center justify-between h-16 md:h-20">
                <!-- Logo - 返回首页 -->
                <a href="index.html" id="homeLink" class="flex items-center space-x-2">
                    <span class="text-xl font-bold text-dark">青尘摄影工作室</span>
                </a>
                
                <!-- 导航菜单 -->
                <div class="flex items-center space-x-6">
                    <a href="#" id="moreLink" class="inline-flex items-center space-x-2 px-4 py-2 bg-gradient-to-r from-primary to-primary/70 text-white rounded-md text-sm font-medium shadow-[0_4px_12px_rgba(0,102,204,0.3)] hover:bg-gradient-to-r from-primary/90 to-primary/50 hover:shadow-[0_6px_20px_rgba(0,102,204,0.4)] transition-all duration-200 transform hover:scale-105 active:scale-95 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
                        <i class="fa fa-home"></i>
                        <span>返回首页</span>
                    </a>
                </div>
            </nav>
        </div>
    </header>

    <!-- 错误提示容器 -->
    <div class="error-overlay" id="errorOverlay" style="display: none;">
        <div class="error-content text-center">
            <i class="fa fa-exclamation-circle text-red-500 text-5xl mb-4"></i>
            <h2 class="text-2xl font-bold mb-2">参数错误</h2>
            <p class="mb-6 text-gray-600">请检查链接是否正确，直播参数不存在或格式有误。</p>
            <a href="index.html" class="inline-flex items-center space-x-2 bg-primary text-white px-4 py-2 rounded-md hover:bg-primary/90 transition-colors">
                <i class="fa fa-home"></i>
                <span>返回首页</span>
            </a>
        </div>
    </div>

    <!-- iframe容器 - 填充中间空间 -->
    <div class="iframe-container" id="iframeContainer">
        <iframe 
            src="" 
            scrolling="yes"
            allowfullscreen
            id="contentIframe"
        ></iframe>
    </div>

    <!-- 页脚 - 固定在底部 -->
    <footer class="fixed bottom-0 left-0 right-0 bg-dark text-white h-16 md:h-20 flex items-center z-50">
        <div class="container mx-auto px-4 md:px-6 lg:px-8 w-full">
            <div class="text-center text-gray-500 text-sm">
                <p class="max-w-full break-normal">
                    <span class="block sm:inline">© 2025-2026 青尘摄影工作室 版权所有</span>
                    <span class="hidden sm:inline"> | </span>
                    <span class="block sm:inline">
                        <a href="privacy.html" class="text-primary hover:text-blue-400 transition-colors underline">隐私策略</a>
                    </span>
                    <span class="hidden sm:inline"> | </span>
                    <span class="block sm:inline">
                        <a href="http://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer" class="text-primary hover:text-blue-400 transition-colors underline">
                            粤ICP备2025515306号-1
                        </a>
                    </span>
                </p>
            </div>
        </div>
    </footer>

    <!-- JavaScript -->
    <script>
        // 参数检查功能
        function checkParameters() {
            // 获取URL参数
            const urlParams = new URLSearchParams(window.location.search);
            const albumId = urlParams.get('id'); // 假设参数名为'id'
            
            // 检查参数是否存在且长度为32位
            if (!albumId || albumId.length !== 32) {
                // 参数不存在或长度不正确，显示错误提示
                showError();
                return null;
            }
            
            return albumId;
        }
        
        // 显示错误提示
        function showError() {
            const errorOverlay = document.getElementById('errorOverlay');
            const iframeContainer = document.getElementById('iframeContainer');
            
            // 显示错误提示，隐藏iframe
            errorOverlay.style.display = 'flex';
            iframeContainer.style.display = 'none';
        }
        
        // 设置iframe的src
        function setIframeSrc() {
            const albumId = checkParameters();
            const iframe = document.getElementById('contentIframe');
            
            if (albumId) {
                // 设置iframe的src为带有正确参数的链接
                iframe.src = `https://m.alltuu.com/album/${albumId}/`;
            }
        }
        
        // 获取iframe元素
        const iframe = document.getElementById('contentIframe');
        
        // 监听iframe内部滚动事件来更新进度条
        iframe.onload = function() {
            try {
                // 获取iframe内部文档
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                
                // 监听iframe内部滚动
                iframeDoc.addEventListener('scroll', function() {
                    updateProgressBar();
                });
            } catch (error) {
                console.log('跨域访问限制，使用iframe容器滚动');
                // 跨域时，使用默认的window滚动事件
            }
        };
        
        // 更新进度条的函数
        function updateProgressBar() {
            let scrollTop, scrollHeight, clientHeight;
            
            try {
                // 尝试获取iframe内部文档的滚动信息
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                scrollTop = iframeDoc.documentElement.scrollTop || iframeDoc.body.scrollTop;
                scrollHeight = iframeDoc.documentElement.scrollHeight || iframeDoc.body.scrollHeight;
                clientHeight = iframeDoc.documentElement.clientHeight || iframeDoc.body.clientHeight;
            } catch (error) {
                // 跨域时，使用默认的window滚动信息
                scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
                scrollHeight = document.documentElement.scrollHeight || document.body.scrollHeight;
                clientHeight = document.documentElement.clientHeight || document.body.clientHeight;
            }
            
            // 计算滚动百分比
            const scrollPercentage = (scrollHeight > clientHeight) ? (scrollTop / (scrollHeight - clientHeight)) * 100 : 0;
            
            // 更新进度条
            const progressBar = document.getElementById('progressBar');
            if (progressBar) {
                progressBar.style.width = scrollPercentage + '%';
            }
        }
        
        // 添加新函数来更新"更多"链接和Logo链接
        function updateMoreLink() {
            const urlParams = new URLSearchParams(window.location.search);
            const albumId = urlParams.get('id');
            const moreLink = document.getElementById('moreLink');
            const homeLink = document.getElementById('homeLink');
            
            if (albumId) {
                moreLink.href = `index.html?id=${albumId}`;
                homeLink.href = `index.html?id=${albumId}`;
            } else {
                moreLink.href = 'index.html';
                homeLink.href = 'index.html';
            }
        }
        
        // 页面加载完成后执行参数检查和iframe设置
        window.addEventListener('DOMContentLoaded', function() {
            setIframeSrc();
            updateMoreLink();
        });
    </script>
</body>
</html>
