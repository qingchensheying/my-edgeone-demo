        tailwind.config = {

                        primary: '#0066CC',

                        accent: '#FF6D00',

    <!-- 进度条样式 -->
    <style>
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: #0066CC;
            z-index: 9999;
            transition: width 0.2s ease;
        }

        /* 固定定位布局 */
        body {
            margin: 0;
            padding: 0;
        }

        /* iframe容器样式 - 填充中间空间 */
        .iframe-container {
            height: 100%;
            overflow: hidden;
        }

        /* 确保html和body占满整个屏幕 */
        html, body {
            height: 100%;
        }

        /* iframe样式 - 撑满容器 */
        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* 错误提示样式 */
        .error-overlay {
            background: #f8fafc;
            /* 浅灰色背景，与导航栏半透明白色区分 */
            display: flex;
            align-items: center;
            /* 垂直方向居中对齐 */
            justify-content: center;
            z-index: 40;
            padding: 2rem;
        }

        /* 错误提示内容样式 */
        .error-content {
            max-width: 400px;
            background: white;
            /* 内容区域使用白色 */
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            /* 添加阴影增加层次感 */
        }
        
        /* 页脚智能分隔线 */
        .footer-item:not(:first-child) {
            position: relative;
            margin-left: 0.25rem;
            padding-left: 0.5rem;
        }
        
        .footer-item:not(:first-child)::before {
            content: '|';
            position: absolute;
            left: 0;
            color: #4B5563;
        }
    </style>
    <script>

<body class="bg-white text-secondary antialiased flex flex-col min-h-screen">
    <!-- 进度条 -->
    <div class="progress-bar" id="progressBar"></div>

    <!-- 导航栏 - 固定在顶部 -->
    <header class="hidden fixed top-0 left-0 right-0 bg-white/80 backdrop-blur-sm z-50 border-b border-gray-200">
        <div class="container mx-auto px-4 md:px-6 lg:px-8">
            <nav class="flex items-center justify-between h-16 md:h-20">
                <!-- Logo - 返回首页 -->
                <a href="index.html" id="homeLink" class="flex items-center space-x-2">
                    <span class="text-xl font-bold text-dark">青尘摄影工作室</span>
                </a>

                <!-- 导航菜单 -->
                <div class="flex items-center space-x-1.5">
                    <a href="#" id="promotionLink"
                        class="inline-flex items-center space-x-0.5 px-1 py-2 bg-gradient-to-r from-[#FF7D00] to-[#FF7D00]/80 text-white rounded-md text-xs font-medium shadow-[0_4px_12px_rgba(255,125,0,0.3)] hover:bg-gradient-to-r from-[#FF7D00]/90 to-[#FF7D00]/60 hover:shadow-[0_6px_20px_rgba(255,125,0,0.4)] transition-all duration-200 transform hover:scale-105 active:scale-95 focus:outline-none focus:ring-2 focus:ring-[#FF7D00] focus:ring-offset-2">
                        <span>🎁</span>
                        <span>随意逛逛</span>
                    </a>
                    <a href="#" id="moreLink"
                        class="inline-flex items-center space-x-0.5 px-1 py-2 bg-gradient-to-r from-primary to-primary/70 text-white rounded-md text-xs font-medium shadow-[0_4px_12px_rgba(0,102,204,0.3)] hover:bg-gradient-to-r from-primary/90 to-primary/50 hover:shadow-[0_6px_20px_rgba(0,102,204,0.4)] transition-all duration-200 transform hover:scale-105 active:scale-95 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
                        <i class="fa fa-home"></i>
                        <span>返回首页</span>
                    </a>
                </div>
            </nav>
        </div>
    </header>

    <!-- 中间内容区域 -->
    <div class="flex-grow pt-16 md:pt-20 relative" id="mainContent">
        <!-- 错误提示容器 -->
        <div class="error-overlay absolute inset-0" id="errorOverlay" style="display: none;">
            <div class="error-content text-center">
                <i class="fa fa-exclamation-circle text-red-500 text-5xl mb-4"></i>
                <h2 class="text-2xl font-bold mb-2">参数错误</h2>
                <p class="mb-6 text-gray-600">请检查链接是否正确，直播参数不存在或格式有误。</p>
                <a href="index.html"
                    class="inline-flex items-center space-x-2 bg-primary text-white px-4 py-2 rounded-md hover:bg-primary/90 transition-colors">
                    <i class="fa fa-home"></i>
                    <span>返回首页</span>
                </a>
            </div>
        </div>
        <!-- iframe容器 - 填充中间空间 -->
        <div class="iframe-container h-full" id="iframeContainer">
            <iframe src="" scrolling="yes" allowfullscreen id="contentIframe"></iframe>
        </div>
    </div>

    <!-- 页脚 - 与首页保持一致 -->
<footer class="hidden bg-dark text-white py-2 md:py-3 flex items-center justify-center">
    <div class="container mx-auto w-full">
            <div class="text-center text-gray-500 text-xs space-y-1">
            <!-- 第一行：版权信息和隐私策略 -->
            <div class="flex items-center justify-center flex-wrap">
                <span class="footer-item">© 2025-
                    <script>document.write(new Date().getFullYear());</script> 青尘摄影工作室 版权所有
                </span>
                <a href="privacy.html" id="privacyLink" 
                   class="footer-item text-primary hover:text-blue-400 transition-colors underline">
                    隐私策略
                </a>
                <a href="index.html" id="contactLink" 
                   class="footer-item text-primary hover:text-blue-400 transition-colors underline">
                    联系我们
                </a>
            </div>
            
            <!-- 第二行：备案信息 -->
            <div class="flex items-center justify-center flex-wrap">
                <a href="http://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer" 
                   class="footer-item text-primary hover:text-blue-400 transition-colors underline">
                    粤ICP备2025515306号-1
                </a>
                <a href="https://beian.mps.gov.cn/#/query/webSearch?code=44060502004173" 
                   target="_blank" rel="noopener noreferrer" 
                   class="footer-item text-primary hover:text-blue-400 transition-colors underline flex items-center gap-1">
                    <img src="image/备案图标.png" alt="公安备案图标" class="w-4 h-4 inline-block align-middle">
                    <span>粤公网安备44060502004173号</span>
                </a>
            </div>
        </div>
    </div>
</footer>

    <!-- JavaScript -->
    <script>
        // 参数检查功能
        function checkParameters() {
            // 获取URL参数
            const urlParams = new URLSearchParams(window.location.search);
            const albumId = urlParams.get('id');

            // 检查参数是否存在且长度为32位
            if (!albumId || albumId.length !== 32) {
                // 参数不存在或长度不正确，显示错误提示
                showError();
                return null;
            }

            return albumId;
        }

        // 显示错误提示
        function showError() {
            const errorOverlay = document.getElementById('errorOverlay');
            const iframeContainer = document.getElementById('iframeContainer');

            // 显示错误提示，隐藏iframe
            errorOverlay.style.display = 'flex';
            iframeContainer.style.display = 'none';
        }

        // 设置iframe的src
        function setIframeSrc() {
            try {
                const albumId = checkParameters();
                const iframe = document.getElementById('contentIframe');

                if (albumId && iframe) {
                    // 设置iframe的src为带有正确参数的链接
                    iframe.src = `https://m.alltuu.com/album/${albumId}/`;
                }
            } catch (error) {
                console.error('setIframeSrc error:', error);
            }
        }

        // 获取iframe元素
        let iframe;

        // 初始化iframe相关功能
        function initIframe() {
            try {
                iframe = document.getElementById('contentIframe');
                if (!iframe) return;
                
                // 监听iframe内部滚动事件来更新进度条
                iframe.onload = function () {
                    try {
                        // 获取iframe内部文档
                        const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;

                        // 监听iframe内部滚动
                        iframeDoc.addEventListener('scroll', function (e) {
                            updateProgressBar();
                            // 确保iframe内部滚动事件不会冒泡到父页面
                            e.stopPropagation();
                        });
                    } catch (error) {
                        console.log('跨域访问限制，使用iframe容器滚动');
                        // 跨域时，使用默认的window滚动事件
                    }
                };
            } catch (error) {
                console.error('initIframe error:', error);
            }
        }

        // 更新进度条的函数
        function updateProgressBar() {
            let scrollTop, scrollHeight, clientHeight;

            try {
                // 尝试获取iframe内部文档的滚动信息
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                scrollTop = iframeDoc.documentElement.scrollTop || iframeDoc.body.scrollTop;
                scrollHeight = iframeDoc.documentElement.scrollHeight || iframeDoc.body.scrollHeight;
                clientHeight = iframeDoc.documentElement.clientHeight || iframeDoc.body.clientHeight;
            } catch (error) {
                // 跨域时，使用默认的window滚动信息
                scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
                scrollHeight = document.documentElement.scrollHeight || document.body.scrollHeight;
                clientHeight = document.documentElement.clientHeight || document.body.clientHeight;
            }

            // 计算滚动百分比
            const scrollPercentage = (scrollHeight > clientHeight) ? (scrollTop / (scrollHeight - clientHeight)) * 100 : 0;

            // 更新进度条
            const progressBar = document.getElementById('progressBar');
            if (progressBar) {
                progressBar.style.width = scrollPercentage + '%';
            }
        }

        // 添加新函数来更新导航链接和Logo链接
        function updateLink() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const albumId = urlParams.get('id');
                
                // 获取所有链接元素，检查是否存在
                const promotionLink = document.getElementById('promotionLink');
                const moreLink = document.getElementById('moreLink');
                const homeLink = document.getElementById('homeLink');
                const privacyLink = document.getElementById('privacyLink');
                const contactLink = document.getElementById('contactLink');

                const links = [promotionLink, moreLink, homeLink, privacyLink, contactLink];
                const baseUrls = ['promotion.html', 'index.html', 'index.html', 'privacy.html', 'index.html'];
                const refs = ['alltuupromo', 'alltuumore', 'alltuuhome', 'alltuuprivacy', 'alltuucontact'];

                links.forEach((link, index) => {
                    if (link) {
                        if (albumId) {
                            link.href = `${baseUrls[index]}?id=${albumId}&ref=${refs[index]}`;
                        } else {
                            link.href = baseUrls[index];
                        }
                    }
                });
            } catch (error) {
                console.error('updateLink error:', error);
            }
        }
        // 检查是否需要隐藏导航和页脚
        function checkHideMode() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const hide = urlParams.get('hide');
                
                const header = document.querySelector('header');
                const footer = document.querySelector('footer');
                const mainContent = document.getElementById('mainContent');
                
                // 检查DOM元素是否存在
                if (!header || !footer || !mainContent) {
                    console.error('checkHideMode error: DOM elements not found');
                    return;
                }
                
                // 当参数存在且值为1时，隐藏导航栏和页脚，使iframe满屏
                if (hide && hide === '1') {
                    // 隐藏导航栏和页脚
                    header.style.display = 'none';
                    footer.style.display = 'none';
                    
                    // 移除顶部内边距，让iframe满屏
                    mainContent.classList.remove('pt-16', 'md:pt-20');
                    mainContent.classList.add('pt-0');
                    
                    // 设置body为100%高度，确保iframe可以占满整个屏幕
                    document.body.style.height = '100vh';
                    document.body.style.overflow = 'hidden';
                }
                else{
                    // 如果参数不存在或值不为1，确保导航栏和页脚显示，并恢复顶部内边距
                    header.classList.remove('hidden');
                    header.style.display = 'block';
                    footer.classList.remove('hidden');
                    footer.style.display = 'flex';
                    mainContent.classList.add('pt-16', 'md:pt-20');
                    mainContent.classList.remove('pt-0');
                    document.body.style.height = '';
                    document.body.style.overflow = '';
                }
            } catch (error) {
                console.error('checkHideMode error:', error);
            }
        }

        // 页面加载完成后执行参数检查和iframe设置
        function initPage() {
            try {
                setIframeSrc();
                updateLink();
                checkHideMode();
                initIframe();
                // 确保页面可以正常滚动
                document.body.style.touchAction = 'auto';
            } catch (error) {
                console.error('initPage error:', error);
                // 即使初始化出错，也要确保页面可以滚动
                document.body.style.touchAction = 'auto';
            }
        }

        window.addEventListener('DOMContentLoaded', initPage);
        
        // 监听页面显示事件，确保从其他页面返回时也能正确初始化
        window.addEventListener('pageshow', function(event) {
            if (event.persisted) {
                // 页面是从缓存中恢复的，重新初始化
                initPage();
            }
        });
    </script>
</body>
