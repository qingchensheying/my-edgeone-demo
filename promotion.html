<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青尘摄影工作室 - 随意逛逛</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- 自定义配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0066CC',
                        secondary: '#1E293B',
                        accent: '#FF6D00',
                        dark: '#111111',
                        light: '#F5F5F5',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <!-- 进度条样式 -->
    <style>
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: #0066CC;
            z-index: 9999;
            transition: width 0.2s ease;
        }

        /* 页脚智能分隔线 */
        .footer-item:not(:first-child) {
            position: relative;
            margin-left: 0.25rem;
            padding-left: 0.5rem;
        }

        .footer-item:not(:first-child)::before {
            content: '|';
            position: absolute;
            left: 0;
            color: #4B5563;
        }
    </style>
    <script>
        var _hmt = _hmt || [];
        (function () {
            var hm = document.createElement("script");
            hm.src = "https://hm.baidu.com/hm.js?cf3a5f4a8a435f0a6a15ed90ddc7a1de";
            var s = document.getElementsByTagName("script")[0];
            s.parentNode.insertBefore(hm, s);
        })();
    </script>
</head>

<body class="bg-white text-secondary antialiased flex flex-col min-h-screen">

    <!-- 进度条 -->
    <div class="progress-bar" id="progressBar"></div>

    <!-- 导航栏 -->
    <header class="fixed top-0 left-0 right-0 bg-white/80 backdrop-blur-sm z-50 border-b border-gray-200">
        <div class="container mx-auto px-4 md:px-6 lg:px-8">
            <nav class="flex items-center justify-between h-16 md:h-20">
                <!-- Logo - 返回首页 -->
                <a href="index.html" id="homeLink" class="flex items-center space-x-2">
                    <span class="text-xl font-bold text-dark">青尘摄影工作室</span>
                </a>

                <!-- 导航菜单 -->
                <div class="flex items-center space-x-6">
                    <a href="javascript:window.history.back()"
                        class="text-sm font-medium text-gray-700 hover:text-primary transition-colors">返回</a>
                </div>
            </nav>
        </div>
    </header>

    <!-- 主要内容 -->
    <main class="flex-1 pt-16 md:pt-20">
        <section
            class="relative bg-gradient-to-br from-gray-50 to-gray-100 pt-0 md:pt-10 lg:pt-10 pb-8 md:pb-10 lg:pb-10">
            <div class="container mx-auto px-4 md:px-6 lg:px-8 max-w-4xl">
                <h1 class="text-[clamp(1.5rem,3vw,2.5rem)] font-bold text-dark mb-1 text-center">限时优惠</h1>
                <div class="flex justify-center items-center p-2 bg-white rounded-lg shadow-sm">
                     <img src="image/青尘摄影海报20260128.jpg" alt="照片1"
                        class="w-full max-w-2xl h-auto rounded-lg shadow-md transition-all duration-300 hover:shadow-lg">
                </div>
                
                <!-- 分隔线 -->
                <hr class="my-2 border-gray-300">
                
                <h1 class="text-[clamp(1.5rem,3vw,2.5rem)] font-bold text-dark mb-1 text-center">芍药</h1>
                <div class="flex justify-center items-center p-2 bg-white rounded-lg shadow-sm">
                     <img src="photo/芍药/imgl3524.jpg" alt="照片1"
                        class="w-full max-w-2xl h-auto rounded-lg shadow-md transition-all duration-300 hover:shadow-lg">
                </div>
                <div class="flex justify-center items-center p-2 bg-white rounded-lg shadow-sm">
                     <img src="photo/芍药/imgl3560.jpg" alt="照片2"
                        class="w-full max-w-2xl h-auto rounded-lg shadow-md transition-all duration-300 hover:shadow-lg">
                </div>
                <div class="flex justify-center items-center p-2 bg-white rounded-lg shadow-sm">
                     <img src="photo/芍药/imgl3588.jpg" alt="照片3"
                        class="w-full max-w-2xl h-auto rounded-lg shadow-md transition-all duration-300 hover:shadow-lg">
                </div>
            </div>
        </section>
    </main>

    <!-- 页脚 -->
    <footer class="bg-dark text-white py-2 md:py-3 flex items-center justify-center">
        <div class="container mx-auto w-full">
            <div class="text-center text-gray-500 text-xs space-y-1">
                <!-- 第一行：版权信息和隐私策略 -->
                <div class="flex items-center justify-center flex-wrap">
                    <span class="footer-item">© 2025-
                        <script>document.write(new Date().getFullYear());</script> 青尘摄影工作室 版权所有
                    </span>
                    <a href="privacy.html" id="privacyLink"
                        class="footer-item text-primary hover:text-blue-400 transition-colors underline">
                        隐私策略
                    </a>

                </div>

                <!-- 第二行：备案信息 -->
                <div class="flex items-center justify-center flex-wrap">
                    <a href="http://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer"
                        class="footer-item text-primary hover:text-blue-400 transition-colors underline">
                        粤ICP备2025515306号-1
                    </a>
                    <a href="https://beian.mps.gov.cn/#/query/webSearch?code=44060502004173" target="_blank"
                        rel="noopener noreferrer"
                        class="footer-item text-primary hover:text-blue-400 transition-colors underline flex items-center gap-1">
                        <img src="image/备案图标.png" alt="公安备案图标" class="w-4 h-4 inline-block align-middle">
                        <span>粤公网安备44060502004173号</span>
                    </a>
                </div>
            </div>
        </div>
    </footer>

    <!-- JavaScript -->
    <script>
        // 更新链接，添加URL参数（如果有）
        function updateLink() {
            const urlParams = new URLSearchParams(window.location.search);
            const albumId = urlParams.get('id');
            const homeLink = document.getElementById('homeLink');
            const privacyLink = document.getElementById('privacyLink');
            if (albumId) {
                homeLink.href = `index.html?id=${albumId}`;
                privacyLink.href = `privacy.html?id=${albumId}`;
            } else {
                homeLink.href = 'index.html';
                privacyLink.href = 'privacy.html';
            }
        }
        // 进度条功能
        window.addEventListener('scroll', () => {
            try {
                const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
                const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                const scrollPercentage = (scrollHeight > 0) ? (scrollTop / scrollHeight) * 100 : 0;

                const progressBar = document.getElementById('progressBar');
                if (progressBar) progressBar.style.width = scrollPercentage + '%';

                // 导航栏样式变化
                const header = document.querySelector('header');
                if (header) {
                    if (scrollTop > 50) {
                        header.classList.add('shadow-sm');
                    } else {
                        header.classList.remove('shadow-sm');
                    }
                }
            } catch (scrollError) {
                console.error('滚动事件处理出错:', scrollError);
            }

            updateLink();
        });
    </script>
</body>

</html>
